version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: gold-predictor-db
    environment:
      POSTGRES_USER: golduser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gold_secure_pass_2024}
      POSTGRES_DB: gold_predictor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golduser -d gold_predictor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gold-predictor-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://golduser:${POSTGRES_PASSWORD:-gold_secure_pass_2024}@db:5432/gold_predictor
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gold-predictor-web
    ports:
      - "3080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
